services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oracle
      POSTGRES_PASSWORD: oracle
      POSTGRES_DB: oracle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "oracle", "-d", "oracle"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
