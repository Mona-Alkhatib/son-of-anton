services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anton
      POSTGRES_PASSWORD: anton
      POSTGRES_DB: anton
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "anton", "-d", "anton"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres_data:
